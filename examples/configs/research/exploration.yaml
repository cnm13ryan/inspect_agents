# Exploration planner config (example)
#
# This file provides defaults for the examples exploration flow.
# - planner_tool.py: if called with no `config`, it attempts to load this YAML
#   and will use the values under `policy:` (falling back to in-code defaults).
# - runner.py: reads `policy` for planner config, and also (optionally) reads
#   `supervisor` to override attempts/prompts and `scoring` for future use.
#
# Only the following keys under `policy` are used by the current tool wrapper:
#   - max_queries (int): hard cap on number of queries to return (1..32)
#   - breadth (int): number of breadth groups to seed (1..8)
#   - depth (int): per-query depth hint (1..8)
#   - tags (list[str]): default tags to attach to each query
# Other keys are ignored by the wrapper, but kept here for future expansion.

version: 1
name: default-exploration
description: Default exploration planner policy for examples

policy:
  # Upper bound for generated queries (the tool may return fewer)
  max_queries: 6

  # Breadth groups (0 => broad seeds, >0 => more focused templates)
  breadth: 3

  # Depth hint to pass along with each query
  depth: 2

  # Default tags added to each query (the tool also appends broad/deep)
  tags:
    - exploration
    - planner
    - default

  # (Optional/ignored by current wrapper) Template hints for future planners
  templates:
    broad:
      - "{topic} overview"
      - "key concepts in {topic}"
      - "recent developments in {topic}"
    focused:
      - "challenges and open questions in {topic}"
      - "notable stakeholders and sources on {topic}"
      - "measurement/benchmarks for {topic}"
      - "risks and controversies around {topic}"

# Optional scoring configuration (not yet consumed by planner_tool; runner reads it for future wiring)
scoring:
  # Component weights
  w_authority: 0.35
  w_recency: 0.25
  w_topic: 0.30
  w_citation: 0.10
  # Domain priors
  domain_whitelist: ["arxiv.org", "*.gov", "*.edu"]
  domain_blacklist: []

# Optional supervisor configuration applied by the examples runner
supervisor:
  # Attempts (submit-terminated ReAct loop). If omitted, runner CLI --attempts is used.
  attempts: 3
  # Optional prompt overrides; when provided, the runner uses these in place
  # of its defaults for role setup. Supervisor override is prepended to the
  # runner's fixed instructions.
  prompts:
    supervisor: "You are the orchestrator for exploration; plan, persist, and handoff."
    research: "You are a dedicated researcher; execute the plan and write a cited report."
    critique: "You are a detailed editor; improve structure and citations in the report."
