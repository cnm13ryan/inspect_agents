[pytest]
testpaths = tests

# Centralized marker declarations so `pytest --markers` documents them
# and to avoid unknown-marker warnings during selection.
markers =
    benchmark: performance and micro/macro benchmark tests
    network: tests that require external network access
    truncation: tool/output truncation behavior and limits
    parallel: concurrency and parallel execution behavior
    approvals: approval policy flows and defaults
    handoff: handoff tools and exclusivity behavior
    filters: result filtering/selection behavior
    kill_switch: parallelism kill-switch and policy enforcement
    timeout: timeout/limits and budget behavior
    model_flags: model-selection flags and env-driven toggles

# Optional: quiet output + extra summary for xfail/skip/error
addopts = -q -ra
