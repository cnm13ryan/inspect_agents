theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/white-balance-sunny
        name: Switch to light mode
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.path
    - toc.follow
    - toc.integrate
    - content.code.copy

extra_javascript:
  # Keep mermaid2 plugin as sole renderer; no CDN mermaid here.
  - assets/javascripts/mermaid-extras.js

extra:
  version:
    provider: mike

extra_css:
  - assets/stylesheets/mermaid-extras.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search:
      lang: en
  - mermaid2:
      version: 10.6.1
  - autorefs
  - redirects
  - glightbox
  - exclude-search:
      exclude:
        - backlog/**
  - git-revision-date-localized:
      fallback_to_build_date: false
      enable_creation_date: false
      type: date
      locale: en
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          setup_commands:
            - import sys
            - sys.path.append("src")
          options:
            show_source: true
            show_root_heading: true
            separate_signature: true
            members_order: alphabetical
  # Fast, internal-only link checking; opt-in via env for CI/local
  - htmlproofer:
      enabled: !ENV [ENABLED_HTMLPROOFER, False]
      validate_external_urls: False  # keep CI under 5 minutes (no network)
      skip_downloads: True           # avoid fetching remote content
      raise_error_after_finish: True # report all bad links, then fail

# Removed custom search-index post-processing hook in favor of
# mkdocs-exclude-search plugin (see plugins above)
