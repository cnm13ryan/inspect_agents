# Hardened Docker Compose template for Inspect sandbox execution
#
# Usage with Inspect CLI:
#   uv run inspect eval examples/tasks/prompt_task.py \
#     --sandbox 'docker:ops/providers/docker/compose.yaml' \
#     -T prompt="List files and summarize"
#
# Security defaults:
# - Rootless user (uid:gid 1000:1000)
# - Read-only root filesystem with tmpfs for /tmp and /run
# - Drop all Linux capabilities; no-new-privileges
# - Modest PID limit to reduce fork bombs
# - Dedicated bridge network (can be replaced with a restricted network)
#
# Notes:
# - The container runs "sleep infinity" so that Inspect can exec into it.
# - Mount a workspace volume at /work for task artifacts.
# - Adjust image as needed; ensure bash/python exist for exec tools.

services:
  sandbox:
    image: ubuntu:22.04
    init: true
    container_name: inspect-sandbox
    user: "1000:1000"
    working_dir: /work
    command: ["sleep", "infinity"]

    # Filesystem hardening
    read_only: true
    tmpfs:
      - /tmp
      - /run

    # Capability and privilege hardening
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      # To use a custom seccomp or AppArmor profile, uncomment and
      # provide valid profiles on the host:
      # - seccomp=./seccomp-restricted.json
      # - apparmor:docker-default

    # Resource guardrails
    pids_limit: 256

    # Workspace mounts (adjust host paths as needed)
    volumes:
      - ./sandbox_work:/work:rw
      - ./sandbox_cache:/cache:rw

    # Network isolation: attach to a dedicated network by default
    networks:
      - sandbox_net  # For N2, consider switching to sandbox_net_internal

    environment:
      - INSPECT_SANDBOX=1
      - HOME=/home/sandbox

networks:
  sandbox_net:
    driver: bridge
    # For N2 (no external egress), uncomment the following line to make the
    # network internal-only. Note this blocks all outbound internet access.
    # internal: true

  # sandbox_net_internal:
  #   driver: bridge
  #   internal: true  # hard N2: no outbound internet

# N1 pattern (domain allow-list via proxy):
# - Run an explicit egress proxy on a separate network and set
#   HTTP(S)_PROXY env vars on the sandbox. Restrict outbound to the
#   proxy container IP using a firewall on the host, or attach the
#   sandbox only to an internal network and connect the proxy to a
#   managed egress network.
#
# Example (sketch only — choose a hardened proxy image in practice):
# services:
#   egress_proxy:
#     image: ghcr.io/zncxxx/tinyproxy:latest
#     networks:
#       - sandbox_net
#   sandbox:
#     environment:
#       - HTTP_PROXY=http://egress_proxy:8888
#       - HTTPS_PROXY=http://egress_proxy:8888

volumes:
  # Named volumes can be used instead of bind mounts above if preferred
  # work:
  # cache:
