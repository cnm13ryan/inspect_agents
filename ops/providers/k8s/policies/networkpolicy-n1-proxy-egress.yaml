# Example NetworkPolicy for N1 (proxy-enforced allow-list)
#
# - Allows egress only to kube-dns and an in-namespace egress proxy
#   selected by label `app=egress-proxy`.
# - Denies all other egress traffic (pair with namespace default deny).
# - Domain-level allow-lists are enforced by the proxy itself.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-egress-via-proxy-only
  namespace: inspect-sandbox
spec:
  podSelector:
    matchLabels:
      app: sandbox
  policyTypes:
    - Egress
  egress:
    # Allow DNS to kube-dns in kube-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow egress to the egress proxy in the same namespace
    - to:
        - podSelector:
            matchLabels:
              app: egress-proxy
      ports:
        - protocol: TCP
          port: 3128
